
services:
  backend:
      build: ./backend
      container_name: backend
      ports:
        - "8000:8000"
      volumes:
        - ./backend:/app
        - gee_credentials:/root/.config/earthengine
      env_file:
        - ./backend/.env
      depends_on:
        postgres:
          condition: service_healthy  
      command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgis/postgis:17-3.5
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: geoinsight
      POSTGRES_USER: mouad  
      POSTGRES_PASSWORD: mouad
    ports:
      - "5432:5432"
    volumes:
      - pgtables:/var/lib/postgresql/data
    healthcheck:                     
      test: ["CMD-SHELL", "pg_isready -U mouad -d geoinsight"]
      interval: 5s
      timeout: 5s
      retries: 5
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: mouad@gmail.com
      PGADMIN_DEFAULT_PASSWORD: mouad
    ports:
      - "5050:80"
    depends_on:
      - postgres

  frontend:
    image: node:20
    container_name: frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  pgtables:
  gee_credentials: